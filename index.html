<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ordinary Machines</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    :root {
      --cream: #f5f0e8;
      --azure: #111210;
      --mid: #6b6b68;
      --rule: #2a2a28;
    }
    html, body {
      height: 100%;
    }
    body {
      background-color: var(--azure);
      color: var(--cream);
      font-family: 'Libre Baskerville', Georgia, serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 3rem 2rem;
    }
    .page {
      width: 100%;
      max-width: 560px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    /* Logo */
    .logo {
      position: fixed;
      top: 2rem;
      left: 2rem;
      width: 50px;
      height: 50px;
      border-radius: 25px;
      object-fit: cover;
      z-index: 10;
      transition: opacity 0.2s ease;
      -webkit-user-drag: none;
    }
    .logo:hover {
      opacity: 0.8;
    }
    /* Footer row */
    .footer {
      margin-top: 3.2rem;
    }
    .wordmark {
      font-size: clamp(2rem, 6vw, 2.8rem);
      font-weight: 400;
      letter-spacing: 0.06em;
      line-height: 1;
      color: var(--cream);
    }
    /* Rule */
    .rule {
      height: 1px;
      background-color: var(--rule);
      margin: 1.8rem 0;
      width: 100%;
    }
    /* Mission */
    .mission {
      font-size: 1.05rem;
      line-height: 1.75;
      color: var(--cream);
      font-weight: 400;
      max-width: 480px;
    }
    /* Footer row */
    .footer {
      margin-top: 3.2rem;
    }
    .contact a {
      font-size: 0.82rem;
      color: var(--cream);
      text-decoration: none;
      letter-spacing: 0.04em;
      border-bottom: 1px solid var(--rule);
      padding-bottom: 1px;
      transition: border-color 0.2s ease;
    }
    .contact a:hover {
      border-color: var(--cream);
    }
    .copyright {
      font-size: 0.72rem;
      color: var(--mid);
      letter-spacing: 0.04em;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <img src="om.png" alt="Ordinary Machines" class="logo" draggable="false"/>
  <main class="page">
    <h1 class="wordmark">Ordinary Machines</h1>
    <div class="rule"></div>
    <p class="mission">
      We research how frontier technologies are reshaping humanity.
      We partner with organizations to guide consequential decisions driven by artificial intelligence.
    </p>
<div class="footer">
  <span class="contact"><a href="mailto:hello@ordinarymachines.com">hello@ordinarymachines.com</a></span>
  <p class="copyright">© 2026 Ordinary Machines LLC</p>
</div>
    </div>
  </main>
</body>
</html>
